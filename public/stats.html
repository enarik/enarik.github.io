<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stats — Booth Manager</title>
  <link rel="stylesheet" href="/css/style.css" />
  <style>
    .main { max-width: 1100px; margin: 0 auto; padding: 1.25rem 1rem; display: grid; grid-template-columns: 260px 1fr; gap: 1.25rem; }
    @media (max-width: 720px) { .main { grid-template-columns: 1fr; } }
    .cal-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.6rem; }
    .cal-nav button { background: none; border: none; cursor: pointer; font-size: 1.1rem; padding: 2px 6px; border-radius: 5px; color: #374151; }
    .cal-nav button:hover { background: #f1f5f9; }
    .cal-month { font-size: 0.875rem; font-weight: 600; color: #1e293b; }
    .bar-chart { display: flex; align-items: flex-end; gap: 2px; height: 80px; }
    .bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; gap: 2px; }
    .bar { width: 100%; border-radius: 3px 3px 0 0; min-height: 2px; background: #e2e8f0; transition: height .3s; }
    .bar.filled { background: #0284c7; }
    .bar-label { font-size: 7px; color: #94a3b8; }
    .date-heading { font-size: 1.1rem; font-weight: 600; color: #1e293b; margin-bottom: 1rem; }
  </style>
</head>
<body>
  <header class="header">
    <div style="display:flex;align-items:center;gap:.75rem">
      <div class="header-logo">Logo</div>
      <span class="header-title">Booth Stats</span>
    </div>
    <div class="header-actions">
      <a href="/admin" class="btn btn-ghost btn-sm" style="color:#fff;border-color:rgba(255,255,255,.25)">← Admin</a>
    </div>
  </header>

  <div class="main">
    <!-- Calendar -->
    <div>
      <div class="card">
        <div class="cal-nav">
          <button id="prev-month">‹</button>
          <span class="cal-month" id="cal-month-label"></span>
          <button id="next-month">›</button>
        </div>
        <div class="cal-header">
          <div class="cal-day-header">Su</div><div class="cal-day-header">Mo</div>
          <div class="cal-day-header">Tu</div><div class="cal-day-header">We</div>
          <div class="cal-day-header">Th</div><div class="cal-day-header">Fr</div>
          <div class="cal-day-header">Sa</div>
        </div>
        <div class="cal-grid" id="cal-grid"></div>
        <p style="font-size:.7rem;color:#94a3b8;text-align:center;margin-top:.5rem">Highlighted = data available</p>
      </div>
    </div>

    <!-- Stats panel -->
    <div>
      <div class="date-heading" id="date-heading"></div>

      <div class="grid-4" style="margin-bottom:1rem" id="stat-cards"></div>

      <div class="grid-2" style="margin-bottom:1rem">
        <div class="card">
          <div style="font-size:.8rem;font-weight:500;color:#64748b;margin-bottom:4px">Avg Wait Time</div>
          <div class="stat-value stat-blue" id="stat-wait">—</div>
        </div>
        <div class="card">
          <div style="font-size:.8rem;font-weight:500;color:#64748b;margin-bottom:4px">Peak Hour</div>
          <div class="stat-value stat-blue" id="stat-peak">—</div>
          <div style="font-size:.75rem;color:#94a3b8" id="stat-peak-sub"></div>
        </div>
      </div>

      <div class="card" id="chart-card" style="display:none">
        <div style="font-size:.8rem;font-weight:600;color:#374151;margin-bottom:.6rem">Parties by Hour</div>
        <div class="bar-chart" id="bar-chart"></div>
      </div>

      <div class="empty-state" id="no-data" style="display:none">No completed visits recorded for this date.</div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script>
    let selectedDate = today();
    let calMonth = new Date();
    let availableDates = new Set();

    async function init() {
      const role = await requireAuth(["admin"]);
      if (!role) return;
      await loadStats(selectedDate);
    }

    async function loadStats(date) {
      try {
        const data = await API.get(`/api/stats?date=${date}`);
        availableDates = new Set(data.availableDates);
        renderCalendar();
        renderStats(data);
      } catch {}
    }

    // ── Stats rendering ────────────────────────────────────────────────────────

    function renderStats(data) {
      // Date heading
      document.getElementById("date-heading").textContent =
        new Date(data.date + "T12:00:00").toLocaleDateString("en-US", { weekday: "long", year: "numeric", month: "long", day: "numeric" });

      // Stat cards
      document.getElementById("stat-cards").innerHTML = [
        { label: "Parties Served", value: data.totalParties, cls: "stat-blue" },
        { label: "Individuals",    value: data.totalIndividuals, cls: "stat-green" },
        { label: "No-shows",       value: data.noShows, cls: "stat-orange" },
        { label: "Avg Party Size", value: data.avgPartySize, cls: "stat-purple" },
      ].map(s => `
        <div class="card stat-card">
          <div class="stat-value ${s.cls}">${s.value}</div>
          <div class="stat-label">${s.label}</div>
        </div>
      `).join("");

      // Wait + peak
      document.getElementById("stat-wait").textContent = formatWait(data.avgWaitMinutes);
      const peakEntries = Object.entries(data.peakHours).sort((a, b) => b[1] - a[1]);
      if (peakEntries.length) {
        const [h, count] = peakEntries[0];
        document.getElementById("stat-peak").textContent = formatHour(Number(h));
        document.getElementById("stat-peak-sub").textContent = `${count} ${count === 1 ? "party" : "parties"} entered`;
      } else {
        document.getElementById("stat-peak").textContent = "—";
        document.getElementById("stat-peak-sub").textContent = "";
      }

      // Bar chart
      const chartCard = document.getElementById("chart-card");
      const noData = document.getElementById("no-data");
      if (data.totalParties === 0) {
        chartCard.style.display = "none";
        noData.style.display = "block";
        return;
      }
      noData.style.display = "none";
      chartCard.style.display = "block";

      const maxCount = Math.max(...Object.values(data.peakHours), 1);
      document.getElementById("bar-chart").innerHTML = Array.from({ length: 24 }, (_, i) => {
        const count = data.peakHours[i] || 0;
        const pct = (count / maxCount) * 100;
        return `<div class="bar-col" title="${formatHour(i)}: ${count}">
          <div class="bar ${count > 0 ? "filled" : ""}" style="height:${Math.max(pct, count > 0 ? 8 : 2)}%"></div>
          ${i % 4 === 0 ? `<div class="bar-label">${i}h</div>` : "<div class='bar-label'></div>"}
        </div>`;
      }).join("");
    }

    // ── Calendar ───────────────────────────────────────────────────────────────

    function renderCalendar() {
      const y = calMonth.getFullYear();
      const m = calMonth.getMonth();
      const monthStr = calMonth.toLocaleDateString("en-US", { month: "long", year: "numeric" });
      document.getElementById("cal-month-label").textContent = monthStr;

      const firstDay = new Date(y, m, 1).getDay();
      const daysInMonth = new Date(y, m + 1, 0).getDate();
      const todayStr = today();

      let html = Array(firstDay).fill('<div class="cal-day empty"></div>').join("");
      for (let d = 1; d <= daysInMonth; d++) {
        const ds = `${y}-${String(m + 1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
        const hasData = availableDates.has(ds);
        const isSelected = ds === selectedDate;
        const isToday = ds === todayStr;
        const cls = ["cal-day", hasData ? "has-data" : "", isSelected ? "selected" : "", isToday && !isSelected ? "today" : ""].filter(Boolean).join(" ");
        html += `<div class="${cls}" data-date="${ds}">${d}</div>`;
      }
      document.getElementById("cal-grid").innerHTML = html;

      document.querySelectorAll(".cal-day.has-data").forEach(el => {
        el.addEventListener("click", () => {
          selectedDate = el.dataset.date;
          loadStats(selectedDate);
        });
      });
    }

    document.getElementById("prev-month").addEventListener("click", () => {
      calMonth = new Date(calMonth.getFullYear(), calMonth.getMonth() - 1, 1);
      renderCalendar();
    });
    document.getElementById("next-month").addEventListener("click", () => {
      calMonth = new Date(calMonth.getFullYear(), calMonth.getMonth() + 1, 1);
      renderCalendar();
    });

    init();
  </script>
</body>
</html>
